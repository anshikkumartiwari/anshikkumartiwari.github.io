<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Writings — Anshik Kumar Tiwari</title>
  <meta name="description" content="Personal essays, deep dives, and technical thoughts by Anshik Kumar Tiwari on software simplicity, native C libraries, and quantitative models.">
  <link rel="icon" type="image/svg+xml" href="images/A.svg">
  <link rel="stylesheet" href="style.css">
  
  <!-- Immediate Theme Initialization to prevent flash of wrong theme -->
  <script>
    (function() {
      const theme = localStorage.getItem("theme") || "system";
      if (theme !== "system") {
        document.documentElement.setAttribute("data-theme", theme);
      }
    })();
  </script>

  <style>
    /* Premium Creative Editorial Styles for /blogs page */
    
    .blogs-hero {
      padding: 8rem 0 4rem;
      transition: background var(--t-normal);
    }
    
    .blogs-meta-label {
      font-family: var(--f-mono);
      font-size: 0.72rem;
      text-transform: uppercase;
      color: var(--accent);
      letter-spacing: 0.12em;
      margin-bottom: 0.75rem;
      display: block;
    }
    
    .blogs-title {
      font-family: var(--f-head);
      font-size: clamp(2.8rem, 7vw, 4.4rem);
      font-weight: 700;
      letter-spacing: -0.04em;
      line-height: 1.05;
      margin-bottom: 1rem;
      color: var(--fg);
    }
    
    .blogs-subtitle {
      color: var(--muted);
      font-size: clamp(1.1rem, 2.4vw, 1.35rem);
      max-width: 640px;
      line-height: 1.6;
      margin-bottom: 3.5rem;
    }

    /* Minimalist Editorial Search input */
    .search-container {
      position: relative;
      margin-bottom: 2rem;
      border-bottom: 1px solid var(--border);
    }
    
    .search-input {
      width: 100%;
      background: transparent;
      border: none;
      color: var(--fg);
      font-family: var(--f-head);
      font-size: clamp(1.4rem, 3.5vw, 1.9rem);
      font-weight: 400;
      padding: 0.6rem 0.5rem 0.6rem 2.2rem;
      box-sizing: border-box;
      outline: none;
      transition: border-color var(--t-fast);
    }
    
    .search-input::placeholder {
      color: var(--border-hv);
      opacity: 0.85;
    }
    
    .search-icon-svg {
      position: absolute;
      left: 0.2rem;
      top: 50%;
      transform: translateY(-50%);
      width: 22px;
      height: 22px;
      fill: none;
      stroke: var(--border-hv);
      stroke-width: 2;
      pointer-events: none;
      transition: stroke var(--t-fast);
    }
    
    .search-input:focus + .search-icon-svg {
      stroke: var(--accent);
    }

    .search-count {
      font-family: var(--f-mono);
      font-size: 0.72rem;
      color: var(--muted);
      margin-top: 1.5rem;
      display: block;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    /* FEATURED ARTICLE HERO CARD */
    .featured-article-container {
      margin-bottom: 5rem;
    }
    
    .featured-card {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 4rem;
      align-items: center;
      padding: 2rem 0;
      border-bottom: 1px solid var(--border);
      transition: border-color var(--t-normal);
    }
    
    .featured-card:hover {
      border-color: var(--accent);
    }

    .featured-badge {
      font-family: var(--f-mono);
      font-size: 0.68rem;
      background: var(--accent-bg);
      color: var(--accent);
      padding: 0.2rem 0.55rem;
      border-radius: 4px;
      display: inline-block;
      margin-bottom: 1.25rem;
      font-weight: 500;
      letter-spacing: 0.05em;
    }

    .featured-title {
      font-family: var(--f-head);
      font-size: clamp(1.8rem, 4.5vw, 2.7rem);
      font-weight: 700;
      line-height: 1.15;
      letter-spacing: -0.03em;
      margin-bottom: 1rem;
      transition: color var(--t-fast);
    }
    
    .featured-card:hover .featured-title {
      color: var(--accent);
    }

    .featured-desc {
      color: var(--muted);
      font-size: 1.05rem;
      line-height: 1.65;
      margin-bottom: 1.5rem;
    }

    .featured-thumb-wrap {
      width: 100%;
      aspect-ratio: 16/10;
      border-radius: 6px;
      overflow: hidden;
      border: 1px solid var(--border);
      background: var(--surface);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color var(--t-fast);
    }
    
    .featured-card:hover .featured-thumb-wrap {
      border-color: var(--accent);
    }

    .featured-thumb {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .featured-monogram {
      font-family: var(--f-head);
      font-weight: 700;
      font-size: clamp(4rem, 10vw, 6rem);
      color: var(--accent);
      opacity: 0.85;
    }

    /* SECONDARY ARTICLES GRID */
    .articles-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 3.5rem 3rem;
      padding: 2rem 0 8rem;
    }

    .editorial-grid-card {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      padding-bottom: 2rem;
      transition: border-color var(--t-normal), transform var(--t-normal);
    }
    
    .editorial-grid-card:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
    }

    .grid-card-thumb-wrap {
      width: 100%;
      aspect-ratio: 16/9;
      border-radius: 4px;
      overflow: hidden;
      border: 1px solid var(--border);
      background: var(--surface);
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color var(--t-fast);
    }
    
    .editorial-grid-card:hover .grid-card-thumb-wrap {
      border-color: var(--accent);
    }

    .grid-card-title {
      font-family: var(--f-head);
      font-size: 1.35rem;
      font-weight: 700;
      line-height: 1.3;
      margin-bottom: 0.6rem;
      transition: color var(--t-fast);
    }
    
    .editorial-grid-card:hover .grid-card-title {
      color: var(--accent);
    }

    .grid-card-desc {
      font-size: 0.92rem;
      color: var(--muted);
      line-height: 1.55;
      margin-bottom: 1.25rem;
      flex-grow: 1;
    }

    .meta-row {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.78rem;
      color: var(--muted);
    }
    
    .meta-sep {
      color: var(--border);
    }

    /* RESPONSIVE DESIGN */
    @media (max-width: 860px) {
      .featured-card {
        grid-template-columns: 1fr;
        gap: 2rem;
      }
      .articles-grid {
        grid-template-columns: 1fr;
        gap: 2.5rem;
      }
    }

    @media (max-width: 520px) {
      .blogs-hero {
        padding: 5.5rem 0 2rem;
      }
      .blogs-subtitle {
        margin-bottom: 2rem;
      }
    }
  </style>
  <script data-goatcounter="https://anshik.goatcounter.com/count"
        async src="//gc.zgo.at/count.js"></script>
</head>
<body class="blogs-page">

  <!-- NAVBAR -->
  <nav class="nav">
    <div class="nav-inner">
      <a href="index.html" class="nav-logo" aria-label="Home">
        <svg class="nav-logo-svg" viewBox="0 0 78.7 73">
          <path d="M 48.4 71.5 L 78.7 71.5 L 37.4 0 L 22.3 26.1 L 48.4 71.5 Z M 16.5 73 C 25.5 73 32.8 65.6 32.8 56.7 C 32.8 47.6 25.5 40.2 16.5 40.2 C 7.4 40.2 0 47.6 0 56.7 C 0 65.6 7.4 73 16.5 73 Z" fill-rule="evenodd" />
        </svg>
      </a>

      <div class="nav-right">
        <a href="index.html#blogs" class="dd-trigger" style="font-weight: 500;">
          ← Portfolio
        </a>
      </div>
    </div>
  </nav>

  <!-- HERO & SEARCH SECTION -->
  <header class="blogs-hero">
    <div class="wrap">
      <span class="blogs-meta-label">Selected Writings</span>
      <h1 class="blogs-title">Blogs &amp; Essays</h1>
      <p class="blogs-subtitle">An archive of deep-dives, essays, and technical notes on systems architecture, languages, and mathematical modeling.</p>
      
      <!-- Custom Minimal Search Input -->
      <div class="search-container">
        <input type="text" id="search-bar" class="search-input" placeholder="Search writings by title, keywords, or topics..." aria-label="Search writings">
        <svg class="search-icon-svg" viewBox="0 0 24 24">
          <circle cx="11" cy="11" r="8"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
      </div>

      <span class="search-count" id="results-count">Scanning files...</span>
    </div>
  </header>

  <!-- ARTICLES WRAPPER -->
  <main class="wrap">
    
    <!-- 1. Featured Article (Dynamic) -->
    <div class="featured-article-container" id="featured-section">
      <!-- Loaded dynamically -->
    </div>

    <!-- 2. Secondary Grid (Dynamic) -->
    <div class="articles-grid" id="grid-section">
      <!-- Loaded dynamically -->
    </div>

  </main>

  <!-- FOOTER -->
  <footer class="site-footer">
    <span>&copy; 2026 Anshik Kumar Tiwari<span id="visitor-count-container" style="display: none;"> &bull; <span id="visitor-count"></span></span></span>
  </footer>

  <script>
    let allArticles = [];
    let searchQuery = "";

    document.addEventListener("DOMContentLoaded", () => {
      loadWritings();
      setupSearch();
      fetch("https://anshik.goatcounter.com/counter/TOTAL.json")
        .then(r => r.json())
        .then(data => {
          if (data && data.count !== undefined) {
            document.getElementById("visitor-count").textContent = data.count + " visitors";
            document.getElementById("visitor-count-container").style.display = "inline";
          }
        })
        .catch(() => {});
    });

    async function loadWritings() {
      // 1. Fetch from manifest
      try {
        const res = await fetch("blogs/manifest.json");
        if (res.ok) {
          allArticles = await res.json();
        }
      } catch (e) {
        console.warn("Local manifest fallback in blogs.html", e);
      }

      // 2. Fetch from GitHub API fallback
      if (allArticles.length === 0) {
        try {
          const res = await fetch("https://api.github.com/repos/anshikkumartiwari/anshikkumartiwari.github.io/contents/blogs");
          if (res.ok) {
            const files = await res.json();
            const mdFiles = files.filter(f => f.name.endsWith('.md') && f.name !== 'template.md');
            
            for (const file of mdFiles) {
              try {
                const fRes = await fetch(file.download_url);
                if (fRes.ok) {
                  const text = await fRes.text();
                  const regex = /^---\r?\n([\s\S]*?)\r?\n---/;
                  const match = text.match(regex);
                  const metadata = {};
                  
                  if (match) {
                    const yaml = match[1];
                    const lines = yaml.split('\n');
                    for (const line of lines) {
                      const colonIdx = line.indexOf(':');
                      if (colonIdx !== -1) {
                        const key = line.slice(0, colonIdx).trim();
                        let val = line.slice(colonIdx + 1).trim();
                        val = val.replace(/^['"]|['"]$/g, '');
                        metadata[key] = val;
                      }
                    }
                  }

                  allArticles.push({
                    file: file.name,
                    title: metadata.title || file.name,
                    subtitle: metadata.subtitle || "",
                    date: metadata.date || "",
                    readTime: metadata.readTime || "",
                    description: metadata.description || ""
                  });
                }
              } catch (e) {
                console.error(e);
              }
            }
          }
        } catch (e) {
          console.error("API load fallback failed in blogs.html", e);
        }
      }

      if (allArticles.length === 0) {
        document.getElementById("featured-section").innerHTML = `
          <div style="text-align:center;color:var(--muted);padding:4rem;font-family:var(--f-mono);">No articles published yet.</div>
        `;
        return;
      }

      renderWritings();
    }

    function setupSearch() {
      const searchBar = document.getElementById("search-bar");
      searchBar.addEventListener("input", (e) => {
        searchQuery = e.target.value.toLowerCase().trim();
        renderWritings();
      });
    }

    function generateSlug(text) {
      return text
        .toLowerCase()
        .replace(/[^a-z0-9\s-]/g, '')
        .replace(/\s+/g, '-')
        .replace(/-+/g, '-');
    }

    function renderWritings() {
      const featuredContainer = document.getElementById("featured-section");
      const gridContainer = document.getElementById("grid-section");
      const countLabel = document.getElementById("results-count");
      
      // Filter list
      const filtered = allArticles.filter(art => {
        return searchQuery === "" || 
          art.title.toLowerCase().includes(searchQuery) ||
          art.description.toLowerCase().includes(searchQuery) ||
          art.subtitle.toLowerCase().includes(searchQuery);
      });

      // Update counter
      if (searchQuery !== "") {
        countLabel.textContent = `Found ${filtered.length} matching article${filtered.length === 1 ? '' : 's'}`;
      } else {
        countLabel.textContent = `Showing all ${filtered.length} articles`;
      }

      if (filtered.length === 0) {
        featuredContainer.innerHTML = "";
        gridContainer.innerHTML = `
          <div style="grid-column: 1/-1; text-align:center; color:var(--muted); padding:5rem 0; font-family:var(--f-mono); font-size:0.9rem;">
            No writings match your criteria. Try adjusting your terms.
          </div>
        `;
        return;
      }

      // Identify Featured Article (most recent, which is the 1st one in array, or matching search)
      const featuredArt = filtered[0];
      const secondaryArts = filtered.slice(1);

      // Render Featured
      const featuredTitleSlug = generateSlug(featuredArt.title);
      const featuredThumbHtml = featuredArt.thumbnail
        ? `<img src="${featuredArt.thumbnail}" alt="" class="featured-thumb">`
        : `<div class="featured-monogram">${featuredArt.title.charAt(0)}</div>`;

      featuredContainer.innerHTML = `
        <a href="pages/article.html?a=${featuredArt.file}" class="featured-card">
          <div>
            <span class="featured-badge">Featured Essay</span>
            <h2 class="featured-title">${featuredArt.title}</h2>
            <p class="featured-desc">${featuredArt.description || featuredArt.subtitle || ""}</p>
            <div class="meta-row">
              <span>Anshik Kumar Tiwari</span>
              <span class="meta-sep">•</span>
              <span>${featuredArt.date}</span>
              <span class="meta-sep">•</span>
              <span>${featuredArt.readTime}</span>
            </div>
          </div>
          <div class="featured-thumb-wrap">
            ${featuredThumbHtml}
          </div>
        </a>
      `;

      // Render Secondary Grid
      gridContainer.innerHTML = secondaryArts.map(art => {
        const titleSlug = generateSlug(art.title);
        const thumbHtml = art.thumbnail
          ? `<img src="${art.thumbnail}" alt="" class="featured-thumb">`
          : `<div class="featured-monogram" style="font-size:3.5rem;">${art.title.charAt(0)}</div>`;

        return `
          <a href="pages/article.html?a=${art.file}" class="editorial-grid-card">
            <div>
              <div class="grid-card-thumb-wrap">
                ${thumbHtml}
              </div>
              <h3 class="grid-card-title">${art.title}</h3>
              <p class="grid-card-desc">${art.description || art.subtitle || ""}</p>
            </div>
            <div class="meta-row" style="margin-top:1.5rem;">
              <span>${art.date}</span>
              <span class="meta-sep">•</span>
              <span>${art.readTime}</span>
            </div>
          </a>
        `;
      }).join('');
    }
  </script>
</body>
</html>
